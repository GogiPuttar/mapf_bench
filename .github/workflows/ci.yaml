name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  python-tests:
    name: Python tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            python-version: "3.10"
          - os: ubuntu-24.04
            python-version: "3.12"
          - os: ubuntu-26.04
            python-version: "3.14"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Smoke test CLI
        run: |
          mapf-bench run \
            --scenario examples/scenarios/two_agents_swap.yaml \
            --solver greedy \
            --out runs/ci_greedy

          test -f runs/ci_greedy/metrics.json
          test -f runs/ci_greedy/replay.json

      - name: Smoke test ASCII replay
        run: |
          mapf-bench replay \
            runs/ci_greedy/replay.json \
            --config examples/render/ci_ascii.yaml

  docker-matrix:
    name: Docker tests (${{ matrix.ubuntu-version }})
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        ubuntu-version:
          - "22.04"
          - "24.04"
          - "26.04"
          - "devel"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build Docker image
        run: |
          docker build \
            --build-arg UBUNTU_VERSION=${{ matrix.ubuntu-version }} \
            -f docker/Dockerfile \
            -t mapf-bench:${{ matrix.ubuntu-version }} .

      - name: Run Docker tests
        run: docker run --rm mapf-bench:${{ matrix.ubuntu-version }}